# qBittorrent capability profile — Single Source of Truth
#
# Sparse: only versions where capabilities actually changed.
# Resolved via two-pass: webapi-version caps first, then app-version caps.
#
# [corrections]   — known upstream webapiVersion bugs (exact-match only)
# [versions]      — webapi-version-keyed capabilities (GET /api/v2/app/webapiVersion)
# [app_versions]  — app-version-keyed capabilities (GET /api/v2/app/version)
#
# Regenerate with: pnpm codegen:capabilities

# ── Known upstream webapiVersion bugs → actual version ─────────────────
[corrections]
"2.7.0" = "2.8.0"

# ── WebAPI-version-keyed capabilities ─────────────────────────────────
# v2.0-floor assumption: no qBittorrent instance reports below 2.0.

[versions."2.0"]
app_version = "v4.1.0"
adds = [
  { name = "supports_rss", description = "RSS feed API (/api/v2/rss/*)" },
  { name = "supports_rss_rules", description = "RSS auto-download rule CRUD (setRule/renameRule/removeRule)" },
]

